  <\!-- C path: center(350,120) R=88 r=54 gap=±48° -->
  <\!-- cos48=0.6691 sin48=0.7431 -->
  <\!-- Outer top : (350+88*0.6691, 120-88*0.7431) = (408.9, 54.6) -->
  <\!-- Outer bot : (350+88*0.6691, 120+88*0.7431) = (408.9, 185.4) -->
  <\!-- Inner bot : (350+54*0.6691, 120+54*0.7431) = (386.1, 160.1) -->
  <\!-- Inner top : (350+54*0.6691, 120-54*0.7431) = (386.1, 79.9) -->
  <path d="M 408.9 54.6
           A 88 88 0 1 0 408.9 185.4
           L 386.1 160.1
           A 54 54 0 1 1 386.1 79.9
           Z"
        fill="url(#cgrad)"/>

  <\!-- Play triangle center(350,120) -->
  <polygon points="333,104 333,136 368,120" fill="white" opacity="0.95"/>

  <\!-- ═══ TEXTE ═══ -->
  <\!-- "CINEA" rouge  "MATCH" blanc  "| IA" rouge -->
