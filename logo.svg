    <tspan fill="#E50914">CINEA</tspan><tspan fill="#ffffff">MATCH</tspan>
  </text>
  <\!-- Separateur vertical + IA -->
  <line x1="576" y1="194" x2="576" y2="242" stroke="#ffffff" stroke-width="2"/>
  <text x="590" y="238" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="#E50914" letter-spacing="-1">IA</text>

