<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
  </defs>

  <\!-- Fond noir arrondi -->
  <rect width="100" height="100" rx="20" fill="#111111"/>

  <\!-- C arc épais — center(50,50) R=36 r=20 gap=±50° -->
  <\!-- cos50=0.6428 sin50=0.7660 -->
  <\!-- outer top : (50+36*0.6428, 50-36*0.7660)=(73.1, 22.4) -->
  <\!-- outer bot : (73.1, 77.6) -->
  <\!-- inner bot : (50+20*0.6428, 50+20*0.7660)=(62.9, 65.3) -->
  <\!-- inner top : (62.9, 34.7) -->
  <path d="M 73.1 22.4
           A 36 36 0 1 0 73.1 77.6
           L 62.9 65.3
           A 20 20 0 1 1 62.9 34.7
           Z"
        fill="url(#g)"/>

  <\!-- Play triangle centré dans le C -->
  <polygon points="43,39 43,61 65,50" fill="white"/>
</svg>
